<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hsin Chaio Tien | Personal Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="profile-section">
                <div class="avatar">
                    <span class="avatar-initials" style="font-size: 1rem;">Tien</span>
                    <div class="status-indicator online" id="status-indicator"></div>
                </div>
                <div class="profile-info">
                    <h1>Hsin Chiao Tien</h1>
                    <p class="subtitle">Developer & Creator</p>
                    <div class="status-text" id="status-text">
                        <span class="dot"></span>  <span class="status-value">Online</span>
                    </div>
                </div>
                
            </div>
            
            <div class="time-widget">
                <div id="clock" class="clock">00:00:00</div>
                <div id="date" class="date">Loading date...</div>
            </div>
        </header>
    </div>

    <script src="script.js"></script>
</body>
</html>
